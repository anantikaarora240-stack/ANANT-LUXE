<!DOCTYPE html>
<html>
<head>
<title>Hotel Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb') no-repeat center center/cover;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.box{
  position:relative;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:280px;
  border:1px solid gold;
}

h2{
  color:gold;
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

button{
  width:95%;
  padding:10px;
  background:gold;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
  <h2>🏨 Admin Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  if(user.value=="admin" && pass.value=="1234"){
    localStorage.setItem("auth","yes");
    window.location.href="admin.html";
  } else {
    alert("Invalid Login");
  }
}
</script>

</body>
</html>
